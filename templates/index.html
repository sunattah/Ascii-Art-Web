<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ASCII Art Web</title>
</head>
<body>

  <h1>ASCII ART WEB</h1>
  <p>Convert text into ASCII art with your choice of banner style.</p>

  <form action="/ascii-art" method="POST">

    <label for="text">Your text</label><br>
    <textarea id="text" name="text" placeholder="Type something here..." required>{{.Text}}</textarea><br><br>

    <input type="radio" id="standard" name="banner" value="standard"
      {{if or (eq .Banner "standard") (eq .Banner "")}}checked{{end}}>
    <label for="standard">Standard</label>

    <input type="radio" id="shadow" name="banner" value="shadow"
      {{if eq .Banner "shadow"}}checked{{end}}>
    <label for="shadow">Shadow</label>

    <input type="radio" id="thinkertoy" name="banner" value="thinkertoy"
      {{if eq .Banner "thinkertoy"}}checked{{end}}>
    <label for="thinkertoy">Thinkertoy</label><br><br>

    <button type="submit">Generate</button>

    {{if .Error}}<p>{{.Error}}</p>{{end}}

  </form>

  {{if .Result}}
  <h2>Result</h2>
  <pre>{{.Result}}</pre>
  {{end}}

</body>
</html>
